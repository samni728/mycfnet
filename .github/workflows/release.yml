name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NAME="mycfnet-${VERSION}-${GOOS}-${GOARCH}"
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "${NAME}" ./cmd/mycfnet
          tar -czf "dist/${NAME}.tar.gz" "${NAME}" .env.example README.md data/locations.json data/ips-v4.txt data/ips-v6.txt
          rm -f "${NAME}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
