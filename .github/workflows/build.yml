name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/mycfnet-${GOOS}-${GOARCH}" ./cmd/mycfnet

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mycfnet-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/mycfnet-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
